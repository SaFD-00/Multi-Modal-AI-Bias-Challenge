# Full finetuning 모드 override (configs/train.yaml 공통 설정 위에 덮어쓴다).
# LLM만 full로 학습. 비전타워/멀티모달 projector는 레지스트리 freeze 패턴으로 항상 freeze.
# LoRA adapter가 아닌 완결 모델이 저장되므로 merge 불필요 → 바로 추론/eval에 사용.
# 실행: python -m src.train.train --model {family} --config configs/train_full.yaml
# 출력은 outputs/{family}/merged/full 로 자동 산출. run_name은 "{family}-full" 자동 생성.
# ⚠️ 7B full FT는 80GB+ 필요(5090 32GB 불가) → 7B는 LoRA 권장.

finetune_type: full

learning_rate: 2.0e-5               # full LLM은 LoRA(1e-4)보다 보수적으로. NaN 발산 이력 고려.

# lora_* 키 없음. 비전 컴포넌트는 src/train/models.py freeze 패턴으로 freeze.
