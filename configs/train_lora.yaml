# LoRA 모드 override (configs/train.yaml 공통 설정 위에 덮어쓴다).
# 베이스라인 추론 모델과 동일 → merge 후 추론 노트북에 그대로 로드 가능.
# 실행: python -m src.train.train --config configs/train_lora.yaml

finetune_type: lora

learning_rate: 1.0e-4               # 2e-4는 warmup peak(step~6)에서 grad NaN 발산 → 1e-4로 하향

# 출력
output_dir: outputs/llava_ov_lora
run_name: llava-ov-0.5b-lora

# LoRA (LLM에만 적용, 비전타워/projector freeze)
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
