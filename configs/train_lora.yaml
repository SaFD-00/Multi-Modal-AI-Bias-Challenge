# LLaVA-OneVision LoRA 학습 설정 (H100 80GB x 1 기준)
# 베이스라인 추론 모델과 동일 → merge 후 추론 노트북에 그대로 로드 가능.

model_id: llava-hf/llava-onevision-qwen2-0.5b-si-hf

# 데이터 (data/processed/train 기준)
train_csv: data/processed/train/train.csv
images_dir: data/processed/train
img_size: 224          # 베이스라인 추론과 동일
val_ratio: 0.05        # 95/5 split (OOD 제외분 기준)
max_length: 4096       # anyres-9 이미지 토큰 확장 여유
# OOD 검증셋(leave-axis-out)은 config.yaml의 ood_axes + paths.metadata를 정본으로 읽는다.

# 출력
output_dir: outputs/llava_ov_lora

# 학습 하이퍼파라미터 (H100 80GB 실측 튜닝)
# 전체 데이터 실측: batch 16은 peak 77GB/80GB(95%, 무인 실행엔 위험), batch 32는 OOM.
# effective(global) batch를 2^n(=32)으로 맞추기 위해 micro-batch 8 × accum 4 채택
# (batch 8은 peak가 batch 12보다 낮아 안전 마진 충분).
seed: 42
num_train_epochs: 2
per_device_train_batch_size: 8      # 안전 micro-batch(batch 16=95%는 위험)
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4      # effective batch = 32 (= 2^5)
learning_rate: 2.0e-4               # effective batch 32 기준(36→32 변화 미미해 유지)
warmup_ratio: 0.03
weight_decay: 0.0
lr_scheduler_type: cosine
logging_steps: 10
bf16: true
gradient_checkpointing: true

# LoRA (LLM에만 적용, 비전타워/projector freeze)
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# 모니터링
wandb_project: skku-bias-llava-ov
run_name: llava-ov-0.5b-lora
